[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --strict-markers
    --verbose
    --tb=short
    --maxfail=5

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, external dependencies)
    api: API endpoint tests
    database: Database tests
    trading: Trading-related tests
    safety: Trading safety tests
    performance: Performance tests
    async: Async tests
    mock: Mock tests
    real_api: Real API tests
    real_trading: Real trading tests using Alpaca paper trading
    paper: Paper trading tests
    live: Live trading tests
    frontend: Frontend functionality tests
    automatic_trading: Automatic trading system tests
    fast: Fast running tests
    e2e: End-to-end tests
    slow: Slow running tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore::FutureWarning
    ignore::RuntimeWarning

minversion = 7.0
